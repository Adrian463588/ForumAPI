# Rate limiting zone: 90 requests per minute
# Diletakkan di LUAR block server agar NGINX tidak error
limit_req_zone $binary_remote_addr zone=threads_limit:1m rate=90r/m;
 
upstream forum_api {
    server 127.0.0.1:5000;
}
 
# Redirect HTTP (Port 80) to HTTPS (Port 443)
server {
    listen 80;
    server_name www.every-carrots-ask-knowlingly.st.a.dcdg.xyz;
 
    return 301 https://$server_name$request_uri;
}
 
# HTTPS Server (Port 443)
server {
    listen 443 ssl;
    server_name www.every-carrots-ask-knowlingly.st.a.dcdg.xyz;
 
    # SSL Certificate (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/www.every-carrots-ask-knowlingly.st.a.dcdg.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.every-carrots-ask-knowlingly.st.a.dcdg.xyz/privkey.pem;
 
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
 
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
 
    # Rate-limited location: /threads dan semua sub-pathnya
    location /threads {
        limit_req zone=threads_limit burst=20 nodelay;
        limit_req_status 429;
 
        proxy_pass http://forum_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # PENTING: Gunakan localhost agar Hapi.js tidak 404
        proxy_set_header Host localhost;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
 
    # Semua routes lainnya (tanpa rate limiting)
    location / {
        proxy_pass http://forum_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # PENTING: Gunakan localhost agar Hapi.js tidak 404
        proxy_set_header Host localhost;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}